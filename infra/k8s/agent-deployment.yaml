# SRE Agent deployment for EKS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: sre-platform
  labels:
    app: sre-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
    spec:
      serviceAccountName: sre-agent
      containers:
        - name: agent
          image: sre-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: sre-secrets
                  key: neo4j_uri
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sre-secrets
                  key: neo4j_password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-secrets
                  key: openai_api_key
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-secrets
                  key: tavily_api_key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: sre-platform
spec:
  selector:
    app: sre-agent
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
