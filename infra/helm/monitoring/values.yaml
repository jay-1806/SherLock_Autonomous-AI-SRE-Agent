# Default values for sherlock-monitoring
prometheus:
  server:
    retention: "30d"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
    scrapeInterval: "15s"
    additionalScrapeConfigs:
      - job_name: "sherlock-api"
        metrics_path: "/metrics"
        static_configs:
          - targets: ["sre-api:8000"]

grafana:
  adminPassword: "change-me-in-production"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "sherlock"
          orgId: 1
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/sherlock

kube-state-metrics:
  enabled: true
