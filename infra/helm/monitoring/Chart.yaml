# SherLock Monitoring Stack — Helm Chart
apiVersion: v2
name: sherlock-monitoring
description: Prometheus + Grafana monitoring stack for SherLock SRE Platform
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
  - name: kube-state-metrics
    version: "5.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
